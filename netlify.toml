[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Internal-only WVTA transition material — block from public serving.
# These files are version-controlled but must not be reachable on the live site.
[[redirects]]
  from = "/cert/windrose-wvta-plan.html"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/cert/windrose-wvta-plan"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/cert/eu-entity-transfer-drafts/*"
  to = "/404.html"
  status = 404
  force = true
